<!DOCTYPE html>
<html lang='fr'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Espace Partenaire - Stop Waiting</title>
<link rel='stylesheet' href='style.css'>
</head>
<body>
<div class='page-container'>
<!-- ENTETE PARTENAIRE -->
<div class='entete'>
<a href='accueil.html' class='bouton-retour'>&#8592; Retour</a>
<span class='entete-titre'>&#127970; Clinique La Grace</span>
</div>
<p class='sous-titre'>Tableau de bord agent d'accueil</p>
<!-- NUMERO EN COURS -->
<div style='background:#2E86C1; border-radius:16px;
padding:20px; width:320px; text-align:center;
margin:15px 0;'>
<p style='font-size:13px; color:#AED6F1;'>Numero en cours</p>
<p id='numero-actuel'
style='font-size:56px; font-weight:bold; color:#FFFFFF;
line-height:1;'>044</p>
<p style='font-size:12px; color:#AED6F1;'>
Temps moyen : 10 min par personne
</p>
</div>
<!-- PROCHAINS NUMEROS -->
<div style='width:320px; margin-bottom:15px;'>
<p style='font-size:13px; color:#AED6F1;
margin-bottom:8px;'>Prochains numeros :</p>
<div style='display:flex; gap:10px;'>
<div style='background:#34495E; border-radius:10px;
padding:12px 20px; text-align:center; flex:1;'>
<p id = 'prochain1' style='font-size:20px; font-weight:bold;
color:#FFFFFF;'>045</p>
</div>
<div style='background:#34495E; border-radius:10px;
padding:12px 20px; text-align:center; flex:1;'>
<p id = 'prochain2' style='font-size:20px; font-weight:bold;
color:#FFFFFF;'>046</p>
</div>
<div style='background:#34495E; border-radius:10px;
padding:12px 20px; text-align:center; flex:1;'>
<p id = 'prochain3' style='font-size:20px; font-weight:bold;
color:#FFFFFF;'>047</p>
</div>
</div>
</div>
<!-- STATISTIQUES DU JOUR -->
<div style='background:#FFFFFF; border-radius:12px;
padding:16px; width:320px; margin-bottom:15px;'>
<p style='font-size:13px; font-weight:bold;
color:#1B4F72; margin-bottom:10px;'>
&#128200; Statistiques du jour
</p>
<div style='display:flex; justify-content:space-between;
margin-bottom:8px;'>
<span style='font-size:12px; color:#555;'>Clients servis</span>
<span id = 'clients-servis' style='font-size:12px; font-weight:bold;
color:#1B4F72;'>43</span>
</div>
<div style='display:flex; justify-content:space-between;
margin-bottom:8px;'>
<span style='font-size:12px; color:#555;'>En attente</span>
<span id = 'en-attente' style='font-size:12px; font-weight:bold;
color:#E67E22;'>25</span>
</div>
<div style='display:flex; justify-content:space-between;',>
<span style='font-size:12px; color:#555;'>Heure de pointe</span>
<span style='font-size:12px; font-weight:bold;
color:#1B4F72;'>09h00 - 11h00</span>
</div>
</div>
<!-- BOUTON SUIVANT -->
<div class='boutons-section'>
<button onclick='appellerSuivant()'
class='bouton-principal'>
Appeler le suivant &#8594;
</button>
</div>
<script>
var numeroActuel = 44;
function mettreAJourAffichage() {
// Afficher le numero en cours
var affichage = numeroActuel.toString().padStart(3, '0');
document.getElementById('numero-actuel').textContent = affichage;

// calculer et afficher les 3 prochains numeros
var p1 = (numeroActuel + 1).toString().padStart(3, '0');
var p2 = (numeroActuel + 2).toString().padStart(3, '0');
var p3 = (numeroActuel + 3).toString().padStart(3, '0');

document.getElementById('prochain1').textContent = p1;
document.getElementById('prochain2').textContent = p2;
document.getElementById('prochain3').textContent = p3;

document.getElementById('clients-servis').textContent = numeroActuel;
document.getElementById('en-attente').textContent = Math.max(0, 25 - (numeroActuel- 44));
}
    function appellerSuivant(){
        numeroActuel++;
        mettreAJourAffichage();
    }
    // Afficher l'etat initial au changement de la page
    mettreAJourAffichage();
</script>
</body>
</html>
