<script src='https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js'></script>
<script src='https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js'></script>
<script src='https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js'></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyAT0mDCRHXznWsQ2VDGDEfLc-nO-_2xDis",
  authDomain: "stop-waiting.firebaseapp.com",
  projectId: "stop-waiting",
  storageBucket: "stop-waiting.firebasestorage.app",
  messagingSenderId: "598109355925",
  appId: "1:598109355925:web:43e973299f32992eff009c"  
};
if (!firebase.apps.length) {
firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();
var service = localStorage.getItem('service')
|| 'Clinique La Grace';
var monNumero = parseInt(
localStorage.getItem('monNumero') || '1');
var alerteEnvoyee = false;
// Afficher le nom du service
document.getElementById('nom-service-suivi')
.textContent = service;
// Afficher le prenom
var prenom = localStorage.getItem('prenom') || '';
// Ecouter la file en temps reel
db.collection('files')
.where('service', '==', service)
.where('statut', '==', 'en-attente')
.orderBy('numero')
.onSnapshot(function(snapshot) {
var personnes = [];
snapshot.forEach(function(doc) {
personnes.push(doc.data());
});
// Calculer combien de personnes avant moi
var avantMoi = 0;
personnes.forEach(function(p) {
if (p.numero < monNumero) avantMoi++;
});
// Mettre a jour le compteur
var compteurEl = document.getElementById('compteur');
compteurEl.textContent = avantMoi;
// Couleur selon l'urgence
compteurEl.classList.remove('urgent', 'attention');
if (avantMoi <= 1) {
compteurEl.classList.add('urgent');
} else if (avantMoi <= 3) {
compteurEl.classList.add('attention');
}
// Barre de progression
var total = Math.max(monNumero, personnes.length);
var pct = ((total - avantMoi) / total) * 100;
document.getElementById('barre')
.style.width = pct + '%';
// Temps estime
document.getElementById('temps')
.textContent = '~' + (avantMoi * 10) + ' minutes';
// Alerte a 3 personnes
if (avantMoi <= 3 && avantMoi > 0) {
document.getElementById('alerte')
.classList.add('visible');
// Notification navigateur
if (!alerteEnvoyee &&
Notification.permission === 'granted') {
new Notification('Stop Waiting', {
body: 'Il reste ' + avantMoi +
' personne(s) avant vous. Preparez-vous !',
icon: 'favicon.ico'
});
alerteEnvoyee = true;
}
}
// Redirection a 0 personnes avant
if (avantMoi === 0) {
setTimeout(function() {
window.location.href = 'notification.html';
}, 2000);
}
});
// Demander permission notification
if (Notification.permission !== 'granted') {
Notification.requestPermission();
}
</script>
